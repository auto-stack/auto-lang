# Deploy Component Gallery to GitHub Pages
#
# This workflow builds the AutoUI Component Gallery documentation site
# and deploys it to GitHub Pages.
#
# Triggered on:
# - Push to main branch with changes in examples/gallery/
# - Manual dispatch

name: Deploy Component Gallery

on:
  push:
    branches: [main]
    paths:
      - 'examples/gallery/**'
      - '.github/workflows/deploy-gallery.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/gallery/generated/vue/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install AutoLang CLI
        run: cargo install --path crates/auto-lang --locked

      - name: Generate Vue Code
        run: |
          cd examples/gallery
          auto.exe vue .
        continue-on-error: true  # Continue even if transpiler isn't ready

      - name: Install Dependencies
        run: |
          cd examples/gallery/generated/vue
          npm ci
        continue-on-error: true

      - name: Build Vue App
        run: |
          cd examples/gallery/generated/vue
          npm run build
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./examples/gallery/generated/vue/dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
