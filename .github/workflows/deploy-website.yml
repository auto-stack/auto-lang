# Deploy Auto Language Website to GitHub Pages
#
# This workflow builds the Auto Language documentation website
# and deploys it to GitHub Pages.

name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout auto-lang
        uses: actions/checkout@v4
        with:
          path: auto-lang

      - name: Checkout book repo
        uses: actions/checkout@v4
        with:
          repository: autostack/book
          path: book
          # If the book repo is private, you may need a token:
          # token: ${{ secrets.BOOK_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: auto-lang/website/package-lock.json

      - name: Install Dependencies
        run: |
          cd auto-lang/website
          npm ci

      - name: Prepare Content
        run: |
          cd auto-lang/website
          node scripts/prepare-content.js

      - name: Build Website
        run: |
          cd auto-lang/website
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./auto-lang/website/.vitepress/dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
