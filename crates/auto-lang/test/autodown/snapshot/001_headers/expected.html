<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .adoc-document { font-family: system-ui, sans-serif; }
        .adoc-heading { margin-top: 1.5em; margin-bottom: 0.5em; font-weight: bold; }
        .adoc-h1 { font-size: 2em; }
        .adoc-h2 { font-size: 1.5em; }
        .adoc-h3 { font-size: 1.25em; }
        .adoc-h4 { font-size: 1em; }
        .adoc-h5 { font-size: 0.875em; }
        .adoc-h6 { font-size: 0.85em; }
        .adoc-paragraph { margin: 1em 0; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="adoc-document">
        <h1 class="adoc-heading adoc-h1">Heading 1</h1>
        <p class="adoc-paragraph">This is a level 1 heading.</p>
        <h2 class="adoc-heading adoc-h2">Heading 2</h2>
        <p class="adoc-paragraph">This is a level 2 heading.</p>
        <h3 class="adoc-heading adoc-h3">Heading 3</h3>
        <p class="adoc-paragraph">This is a level 3 heading.</p>
        <h4 class="adoc-heading adoc-h4">Heading 4</h4>
        <p class="adoc-paragraph">This is a level 4 heading.</p>
        <h5 class="adoc-heading adoc-h5">Heading 5</h5>
        <p class="adoc-paragraph">This is a level 5 heading.</p>
        <h6 class="adoc-heading adoc-h6">Heading 6</h6>
        <p class="adoc-paragraph">This is a level 6 heading.</p>
    </div>
</body>
</html>
