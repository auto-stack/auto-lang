[package]
name = "auto-lang"
version = "0.1.0"
edition = "2021"
description = "Auto is a programming language for automations in various scenarios"
homepage = "https://gitee.com/auto-stack/auto-lang"
repository = "https://gitee.com/auto-stack/auto-lang"
readme = "README.md"
license = "MIT"
keywords = ["automation", "language", "scripting"]

[features]
default = ["with-file-history"]
with-file-history = []
# Plan 081: AutoVM is now the default execution engine (no feature flag required)
# DEPRECATED: The use-bigvm feature is kept for compatibility but has no effect
# AutoVM is always enabled. Use environment variable AUTO_EXECUTION_ENGINE=evaluator
# to switch to the TreeWalker evaluator for debugging/comparison.
use-bigvm = []
# Fallback to TreeWalker evaluator (for debugging/comparison)
use-evaluator = []

[dependencies]
auto-val = { path = "../auto-val" }
rustyline = { workspace = true, features = ["with-file-history"] }
strum = { workspace = true }
strum_macros = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true, features = ["derive"] }
ecow = { workspace = true }
normalize-path = { workspace = true }
roxmltree = { workspace = true }
dirs = { workspace = true }
lazy_static = "1.4"
thiserror = { workspace = true }
miette = { workspace = true }
regex = "1"
auto-lang-macros = { path = "../auto-lang-macros" }
dashmap = { workspace = true }
tokio = { workspace = true, features = ["full"] }
blake3 = { workspace = true }
bincode = { workspace = true }
# Plan 081 Phase 5: Dynamic library loading for C/Rust FFI
libloading = "0.8"
# Logging for FFI bridge
log = { workspace = true }

[dev-dependencies]
criterion = "0.5"
tempfile = "3"

[[bench]]
name = "incremental_transpile_bench"
harness = false
