# Plan 289: Cargo aliases for faster test workflows
# Usage:
#   cargo t          - fast daily tests (no heavy test groups)
#   cargo tv         - VM file tests
#   cargo tt         - transpiler tests
#   cargo tb         - book listing tests (slow: ~5-7s each)
#   cargo ta         - all tests (VM + trans + book)
#
# Requires: cargo install cargo-nextest

# Note: Examples and integration tests are disabled by default (build-examples feature).
# Only lib + lib test are compiled, so no memory pressure from parallel linkers.

[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

[build]
jobs = 8
# Use sccache to cache rustc compilation units and speed up clean builds.
# Comment this out if a crate fails to build through the wrapper.
rustc-wrapper = "sccache.exe"

# PYO3_PYTHON is set per-platform via the user shell environment
# (not here, since [env] is global and cannot differ by target).
# Windows: C:\Python314\python.exe | Linux: /usr/bin/python3

[alias]
t = "nextest run -p auto-lang --lib"
tv = "nextest run -p auto-lang --lib --features test-vm-files"
tt = "nextest run -p auto-lang --lib --features test-trans"
tb = "nextest run -p auto-lang --lib --features test-book"
ta = "nextest run -p auto-lang --lib --features test-vm-files,test-trans,test-book"
